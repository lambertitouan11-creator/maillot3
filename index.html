<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection de Maillots</title>

<style>
body {
  background: #1c1c1c;
  color: white;
  font-family: Arial;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 250px);
  gap: 20px;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #2a2a2a;
  padding: 10px;
  border-radius: 10px;
}

img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}
</style>
</head>

<body>

<h1>Ma Collection</h1>

<div class="grid" id="grid"></div>

<script>
const data = [
  {
    club: "France",
    year: "2026",
    photo: "images/maillot-equipe-de-france-coupe-du-monde-bleu2026.jpg"
  },
  {
    club: "Real Madrid",
    year: "2018",
    photo: "images/real.jpg"
  },
  {
    club: "Barça",
    year: "2020",
    photo: "images/barca.jpg"
  },
  {
    club: "Barça",
    year: "2020",
    photo: "images/barca.jpg"
  }
  ,
  {
    club: "Barça",
    year: "2020",
    photo: "images/barca.jpg"
  }
  ,
  {
    club: "Barça",
    year: "2020",
    photo: "images/barca.jpg"
  }
  ,
  {
    club: "Barça",
    year: "2020",
    photo: "images/barca.jpg"
  }
  ,
  {
    club: "Barça",
    year: "2020",
    photo: "images/barca.jpg"
  }
  ,
  {
    club: "Barça",
    year: "2020",
    photo: "images/barca.jpg"
  }
];

const grid = document.getElementById("grid");

data.forEach(item => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${item.photo}">
    <h3>${item.club}</h3>
    <p>${item.year}</p>
  `;

  grid.appendChild(card);
});
</script>

</body>
</html>
